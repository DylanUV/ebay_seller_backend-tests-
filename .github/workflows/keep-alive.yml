name: Keep backend awake

# Corre cada 10 minutos y también se puede lanzar manualmente desde
# la pestaña "Actions" de GitHub (botón "Run workflow").
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /healtz
        run: |
          curl -sf https://ebay-seller-backend-tests.onrender.com/healtz \
            && echo "Backend despierto ✅" \
            || echo "El ping falló ❌ (revisa el estado del servicio en Render)"